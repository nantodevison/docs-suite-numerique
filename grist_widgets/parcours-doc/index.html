<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parcours documentaire</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f5;
      --color-border: #e0e0e0;
      --color-primary: #1a73e8;
      --color-text: #212121;
      --color-muted: #757575;
      --color-active: #e8f0fe;
      --color-active-border: #1a73e8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-bg);
      padding: 12px;
    }

    #search-bar {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
    }

    #search-bar:focus {
      border-color: var(--color-primary);
    }

    #tree {
      overflow-y: auto;
      max-height: calc(100vh - 60px);
    }

    .chapter {
      cursor: pointer;
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 2px;
      line-height: 1.4;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .chapter:hover {
      background: var(--color-surface);
    }

    .chapter.active {
      background: var(--color-active);
      border-left-color: var(--color-active-border);
    }

    .chapter .numero {
      font-size: 11px;
      color: var(--color-muted);
      margin-right: 4px;
    }

    .chapter .titre {
      font-weight: 500;
    }

    /* Indentation par niveau */
    .level-0 { padding-left: 8px; font-size: 15px; }
    .level-1 { padding-left: 22px; font-size: 14px; }
    .level-2 { padding-left: 36px; font-size: 13px; }
    .level-3 { padding-left: 50px; font-size: 12px; color: var(--color-muted); }

    #empty {
      color: var(--color-muted);
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
    }

    #error {
      color: #d32f2f;
      font-size: 12px;
      padding: 6px;
      background: #fdecea;
      border-radius: 4px;
      margin-bottom: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="error"></div>
  <input id="search-bar" type="search" placeholder="Rechercher un chapitre…" autocomplete="off" />
  <div id="tree"></div>
  <div id="empty" style="display:none">Aucun chapitre trouvé.</div>

  <script src="widget.js"></script>
</body>
</html>
