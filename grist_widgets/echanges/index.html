<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Échanges</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f5;
      --color-border: #e0e0e0;
      --color-primary: #1a73e8;
      --color-text: #212121;
      --color-muted: #757575;
      --color-tag-bg: #e8f0fe;
      --color-tag-text: #1a73e8;
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-bg);
      padding: 12px;
    }

    /* ── Barre d'outils ── */
    #toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #search-bar {
      flex: 1;
      min-width: 120px;
      padding: 7px 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
    }

    #search-bar:focus {
      border-color: var(--color-primary);
    }

    #filter-statut {
      padding: 7px 8px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 13px;
      background: var(--color-bg);
      cursor: pointer;
    }

    /* ── Liste des échanges ── */
    #list {
      overflow-y: auto;
      max-height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .echange {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .echange:hover {
      border-color: var(--color-primary);
    }

    .echange.active {
      border-color: var(--color-primary);
      background: #e8f0fe22;
    }

    .echange-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }

    .echange-titre {
      font-weight: 600;
      font-size: 13px;
      flex: 1;
    }

    .echange-date {
      font-size: 11px;
      color: var(--color-muted);
      white-space: nowrap;
    }

    .echange-auteur {
      font-size: 12px;
      color: var(--color-muted);
      margin-bottom: 4px;
    }

    .echange-contenu {
      font-size: 12px;
      color: var(--color-text);
      line-height: 1.5;
      /* Limite la hauteur du résumé */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 12px;
      font-size: 11px;
      background: var(--color-tag-bg);
      color: var(--color-tag-text);
      margin-top: 6px;
    }

    .tag.statut-ferme   { background: #e8f5e9; color: #2e7d32; }
    .tag.statut-attente { background: #fff8e1; color: #f57f17; }
    .tag.statut-ouvert  { background: #e8f0fe; color: #1a73e8; }

    #empty {
      color: var(--color-muted);
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
    }

    #error {
      color: #d32f2f;
      font-size: 12px;
      padding: 6px;
      background: #fdecea;
      border-radius: 4px;
      margin-bottom: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="error"></div>
  <div id="toolbar">
    <input id="search-bar" type="search" placeholder="Rechercher…" autocomplete="off" />
    <select id="filter-statut">
      <option value="">Tous les statuts</option>
      <option value="ouvert">Ouvert</option>
      <option value="attente">En attente</option>
      <option value="ferme">Fermé</option>
    </select>
  </div>
  <div id="list"></div>
  <div id="empty" style="display:none">Aucun échange trouvé.</div>

  <script src="widget.js"></script>
</body>
</html>
