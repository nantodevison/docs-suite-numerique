<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root{
      --bg:#f8f9fa;--card:#fff;--border:#dee2e6;--accent:#4361ee;--green:#2d6a4f;
      --yellow:#e9c46a;--red:#e63946;--grey:#6c757d;--blue:#457b9d;
      --text:#212529;--text2:#6c757d;--radius:10px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);
        color:var(--text);height:100vh;overflow-y:auto;padding:10px;font-size:13px}

    /* FILTER BAR */
    .filter-bar{display:flex;gap:6px;padding:8px 10px;background:var(--card);
                border:1px solid var(--border);border-radius:var(--radius);
                margin-bottom:8px;align-items:center;flex-wrap:wrap}
    .filter-bar label{font-size:13px;font-weight:600;color:var(--text2)}
    .filter-bar select{padding:4px 8px;font-size:13px;border:1px solid var(--border);border-radius:6px}
    .filter-bar .count{margin-left:auto;font-size:13px;color:var(--text2);font-weight:600}

    /* QUESTION CARDS */
    .qcard{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);
          margin-bottom:6px;overflow:hidden}
    .qcard.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(67,97,238,.15)}
    .qcard.open{height:80vh;display:flex;flex-direction:column;}

    .qcard-head{padding:8px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:6px;
                transition:background .15s;flex-wrap:nowrap;min-height:36px;flex-shrink:0}
    .qcard-ref{font-weight:700;font-size:13px;white-space:nowrap;color:var(--accent);flex-shrink:0}
    .qcard-txt{font-size:14px;color:var(--text);flex:1;min-width:0;
        overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;
        white-space:normal;-webkit-line-clamp:2;max-height:3em;
        transition:max-height .3s ease}
    .qcard-txt.expanded{-webkit-line-clamp:unset;max-height:200px;overflow-y:auto}
    .btn-expand-txt{
      background:none;border:none;cursor:pointer;
      font-size:11px;color:var(--text2);padding:0 4px;
      flex-shrink:0;align-self:flex-start;margin-top:2px;
      transition:transform .2s;line-height:1;
    }
    .btn-expand-txt.expanded{transform:rotate(180deg)}

    .qcard-body{display:none;border-top:1px solid var(--border)}
    .qcard.open .qcard-body{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}

    /* BADGES */
    .badge{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:600;
          white-space:nowrap;flex-shrink:0}
    .s-nouvelle{background:#dbeafe;color:#1e40af}
    .s-en_qualification{background:#e0e7ff;color:#3730a3}
    .s-qualifiee{background:#d1fae5;color:#065f46}
    .s-doublon_detecte{background:#fef3c7;color:#92400e}
    .s-recherche_doc_en_cours{background:#e0e7ff;color:#3730a3}
    .s-reponse_proposee{background:#fef3c7;color:#92400e}
    .s-en_escalade_expert{background:#fee2e2;color:#991b1b}
    .s-reponse_expert_proposee{background:#d1fae5;color:#065f46}
    .s-en_attente_validation{background:#e0e7ff;color:#3730a3}
    .s-validee{background:#d1fae5;color:#065f46}
    .s-insatisfaction{background:#fee2e2;color:#991b1b}
    .s-close{background:#e5e7eb;color:#374151}

    /* COV DOT */
    .cov{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;white-space:nowrap}
    .cov-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .cov-couverte .cov-dot{background:var(--green)}
    .cov-partielle .cov-dot{background:var(--yellow)}
    .cov-non_couverte .cov-dot{background:var(--red)}
    .cov-hors_perimetre .cov-dot{background:var(--grey)}
    .cov-a_evaluer .cov-dot{background:var(--blue)}

    /* INFO PANEL : 4 colonnes */
    .info-panel{
      display:grid;
      grid-template-columns: 0.5fr 0.5fr 0.3fr 1.6fr;
      gap:0;
      background:#fafbfc;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
      align-items:stretch;
    }
    .info-col{
      padding:8px 12px;
      font-size:13px;
      border-right:1px solid var(--border);
    }
    .info-col:last-child{border-right:none}
    .info-col-title{
      font-size:11px;font-weight:700;color:var(--text2);
      text-transform:uppercase;letter-spacing:.5px;
      margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px;
    }

    /* INFO GRID dans col 1 */
    .info-grid{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:2px 8px;
      font-size:13px;
    }
    .info-grid dt{
      color:var(--text2);
      white-space:nowrap;
    }
    .info-grid dd{
      font-weight:500;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    /* THEME TAGS */
    .theme-tags{display:flex;flex-wrap:wrap;gap:4px}
    .theme-tag{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;
      background:#e0e7ff;color:#3730a3;border-radius:6px;font-size:12px;font-weight:600}
    .theme-tag .remove{cursor:pointer;font-size:14px;color:#6366f1;font-weight:700}
    .theme-tag .remove:hover{color:#dc2626}

    /* COV SELECT inline */
    .cov-select{
      width:100%;padding:4px 6px;border:1px solid var(--border);
      border-radius:6px;font-size:13px;background:white;
    }
    .cov-select:focus{outline:none;border-color:var(--accent)}

    /* SOLLICITATION compacte */
    .sollic-wrap{display:flex;flex-direction:column;gap:4px;height:100%}
    .sollic-select{
      width:100%;padding:4px 6px;border:1px solid var(--border);
      border-radius:6px;font-size:13px;background:white;
    }
    .sollic-select:focus{outline:none;border-color:var(--accent)}
    .sollic-bottom{display:flex;gap:6px;align-items:flex-start;flex:1}
    .sollic-textarea{
      flex:1;padding:5px 8px;border:1px solid var(--border);
      border-radius:6px;font-size:13px;font-family:inherit;
      resize:none;height:42px;
    }
    .sollic-textarea:focus{outline:none;border-color:var(--accent)}
    .btn-sollic{
      align-self:flex-start;
      padding:6px 10px;
      border:none;
      background:#f59e0b;
      color:white;
      border-radius:6px;
      font-size:12px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      flex-shrink:0;
    }
    .btn-sollic:hover{background:#d97706}
    .btn-sollic:disabled{opacity:.5;cursor:not-allowed}

    /* MESSAGES */
    .msg-zone{flex:1;min-height:0;overflow-y:auto;padding:10px 14px;
              display:flex;flex-direction:column;gap:8px;background:#f0f7ff;}
    .msg-empty{text-align:center;color:var(--text2);font-size:13px;padding:20px}
    .msg{display:flex;flex-direction:column;max-width:85%}
    .msg.right{align-self:flex-end;align-items:flex-end}
    .msg.left{align-self:flex-start;align-items:flex-start}
    .msg-head{font-size:12px;color:var(--text2);padding:0 8px;
              display:flex;align-items:center;gap:4px}
    .msg-bubble{padding:8px 12px;border-radius:14px;font-size:14px;
                line-height:1.5;word-wrap:break-word}
    .msg.right .msg-bubble{background:#1e40af;color:white;border-bottom-right-radius:4px}
    .msg.left .msg-bubble{background:#e2e8f0;color:#1e293b;border-bottom-left-radius:4px;
                          border-left:3px solid var(--accent)}
    .msg-chapter{font-size:12px;margin-top:2px;padding:3px 8px;background:#fffef5;
                border:1px solid #f5e6a3;border-radius:6px;display:inline-block}
    .msg-time{font-size:11px;color:var(--text2);padding:0 8px}
    .msg-status{font-size:11px;padding:1px 6px;border-radius:8px;font-weight:600}
    .msg-status.proposee{background:#d1fae5;color:#065f46}
    .msg-validate{font-size:11px;margin-top:3px;padding:0 8px}
    .msg-validate button{font-size:11px;padding:2px 8px;border:1px solid var(--green);
      background:white;color:var(--green);border-radius:6px;cursor:pointer;
      font-weight:600;transition:all .15s}
    .msg-validate button:hover{background:var(--green);color:white}
    .msg-validated{font-size:11px;padding:2px 8px;background:#d1fae5;color:#065f46;
      border-radius:6px;font-weight:700;display:inline-block;
      margin-top:3px;margin-left:8px}

    /* INPUT ZONE */
    .inp-zone{flex-shrink:0;padding:10px 14px;border-top:1px solid var(--border);background:#fafbfc;}
    .inp-selectors{display:flex;gap:8px;margin-bottom:6px;align-items:center}
    .inp-selector:first-child{flex:0 0 auto;min-width:140px;max-width:180px;}
    .inp-selector{display:flex;align-items:center;gap:4px;flex:1}
    .inp-selector label{font-size:12px;font-weight:600;color:var(--text2);
                        white-space:nowrap;flex-shrink:0}
    .inp-selector select{flex:1;padding:4px 6px;border:1px solid var(--border);
                        border-radius:6px;font-size:13px}
    .inp-msg textarea{width:100%;resize:vertical;border:1px solid var(--border);
      border-radius:12px;padding:8px 12px;font-size:14px;font-family:inherit;
      outline:none;min-height:80px;max-height:200px}
    .inp-msg textarea:focus{border-color:var(--accent)}
    .btn{padding:7px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .btn-send{background:var(--accent);color:white}
    .btn-propose{background:var(--green);color:white}
    .btn-close{background:var(--grey);color:white;font-size:12px}
    .btn-notify{background:#f59e0b;color:white;font-size:12px}
    .btn-notify:disabled{opacity:.5;cursor:not-allowed}
    .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center}

    /* BANNERS */
    .closed-banner{flex-shrink:0;padding:12px 14px;text-align:center;font-size:14px;
      font-weight:600;background:#e5e7eb;color:#374151;border-top:1px solid var(--border)}
    .validated-banner{flex-shrink:0;padding:12px 14px;text-align:center;font-size:14px;
      font-weight:600;background:#d1fae5;color:#065f46;border-top:1px solid var(--border)}

    /* MISC */
    .empty{text-align:center;padding:40px;color:var(--text2)}
    .empty .icon{font-size:36px;margin-bottom:8px}
    .toast{position:fixed;bottom:12px;right:12px;background:#212529;color:white;
          padding:8px 16px;border-radius:8px;font-size:13px;z-index:999;animation:pop .3s}
    @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* VOTES */
    .vote-box{display:inline-flex;align-items:center;gap:2px;font-size:13px;
              margin-right:8px;user-select:none}
    .vote-btn{cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .15s;
      border:1px solid transparent;line-height:1}
    .vote-btn:hover{background:#e2e8f0}
    .vote-btn.voted-up{color:#16a34a;font-weight:700;border-color:#16a34a;background:#dcfce7}
    .vote-btn.voted-down{color:#dc2626;font-weight:700;border-color:#dc2626;background:#fee2e2}
    .vote-score{font-weight:700;min-width:18px;text-align:center;font-size:14px}
    .vote-score.positive{color:#16a34a}
    .vote-score.negative{color:#dc2626}
    .vote-score.neutral{color:var(--text2)}

    /* MARKDOWN dans les bulles */
    .msg-bubble strong{font-weight:700}
    .msg-bubble em{font-style:italic}
    .msg-bubble code{background:rgba(0,0,0,.1);padding:1px 4px;border-radius:3px;font-size:13px;font-family:monospace}
    .msg-bubble pre{background:rgba(0,0,0,.08);padding:6px 8px;border-radius:6px;font-size:13px;overflow-x:auto;margin:4px 0}
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-weight:700;margin:4px 0 2px}
    .msg-bubble h1{font-size:16px}
    .msg-bubble h2{font-size:15px}
    .msg-bubble h3{font-size:14px}
    .msg-bubble ul,.msg-bubble ol{padding-left:16px;margin:2px 0}
    .msg-bubble li{margin:1px 0}
    .msg-bubble blockquote{border-left:3px solid rgba(0,0,0,.2);padding-left:8px;margin:4px 0;opacity:.8}
    .msg-bubble a{color:inherit;text-decoration:underline}
    .msg-bubble p{margin:2px 0}

    /* MARKDOWN dans le titre de question */
    .qcard-txt p{display:inline;margin:0}
    .qcard-txt strong{font-weight:700}
    .qcard-txt em{font-style:italic}
    .qcard-txt h1,.qcard-txt h2,.qcard-txt h3{display:inline;font-size:14px;font-weight:700}
    .qcard-txt code{background:#f1f3f5;padding:1px 3px;border-radius:3px;font-size:13px;font-family:monospace}
    .qcard-txt ul,.qcard-txt ol,.qcard-txt blockquote{display:inline}
    .qcard-txt li{display:inline}
    .qcard-txt br{display:none}

    /* MD TOOLBAR dans inp-zone */
    .md-btn{
      padding:3px 7px;border:none;background:transparent;
      border-radius:4px;font-size:14px;font-weight:700;
      cursor:pointer;color:var(--text);line-height:1.4;
    }
    .md-btn:hover{background:#dee2e6}

    /* EDIT MESSAGE */
    .btn-edit-msg{
      background:none;border:none;cursor:pointer;
      font-size:12px;padding:2px 5px;border-radius:4px;
      color:var(--text2);transition:all .15s;flex-shrink:0;
    }
    .btn-edit-msg:hover{background:#e2e8f0;color:var(--accent)}
    .msg-edit-zone{display:flex;flex-direction:column;gap:4px;margin-top:4px}
    .msg-edit-zone textarea{
      width:100%;padding:6px 10px;border:1px solid var(--accent);
      border-radius:10px;font-size:13px;font-family:inherit;
      resize:vertical;min-height:60px;outline:none;
    }
    .msg-edit-actions{display:flex;gap:6px}
    .btn-edit-save{padding:4px 12px;background:var(--accent);color:white;
      border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
    .btn-edit-save:hover{opacity:.85}
    .btn-edit-cancel{padding:4px 12px;background:var(--grey);color:white;
      border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
    .btn-edit-cancel:hover{opacity:.85}
    
  </style>
</head>
<body>

  <!-- FILTER BAR -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
              padding:10px;margin-bottom:8px">
    <h2 style="font-size:15px;margin:0 0 8px 0;display:flex;align-items:center;gap:6px;
              color:var(--text);font-weight:600">
      🔍 Filtrer les questions
    </h2>
    <div class="filter-bar" style="border:none;padding:0;margin:0">
      <input type="text" id="filterSearch" placeholder="🔍 Rechercher…" 
        oninput="renderQList()" 
        style="flex:0 0 180px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px">
      
      <label>Thème :</label>
      <select id="filterTheme" onchange="renderQList()" style="flex:0 0 140px">
        <option value="">— Tous —</option>
      </select>
      
      <label style="margin-left:8px">Statut :</label>
      <select id="filterStatut" onchange="renderQList()">
        <option value="all">📋 Toutes</option>
        <option value="nouvelle">🆕 Nouvelles</option>
        <option value="en_cours">💬 En cours</option>
        <option value="validee">✅ Validées</option>
        <option value="close">🔒 Clôturées</option>
      </select>
      
      <label style="margin-left:8px">Auteur :</label>
      <select id="filterAuteur" onchange="renderQList()">
        <option value="all">👥 Tous</option>
        <option value="mes_questions">👤 Mes questions</option>
      </select>
      
      <span class="count" id="qCount"></span>
    </div>
  </div>

  <!-- QUESTION LIST -->
  <div id="qList">
    <div class="empty"><div class="icon">⏳</div>Chargement…</div>
  </div>

</body>
</html>
